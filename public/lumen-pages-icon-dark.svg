<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="400" height="400">
  <defs>
    <linearGradient id="iconGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ca8a04" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="80" height="80" rx="16" fill="#111318"/>

  <!-- Icon box glow -->
  <rect x="8" y="8" width="64" height="64" rx="12" fill="url(#iconGlow)"/>
  <!-- Icon box border -->
  <rect x="8" y="8" width="64" height="64" rx="12" fill="#111318" fill-opacity="0.5" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- Geometric prism icon (centered at 40,40) -->
  <g transform="translate(40,40)" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M0,-14 L14,0 L0,14 L-14,0 Z"/>
    <line x1="0" y1="-14" x2="0" y2="14"/>
    <line x1="0" y1="0" x2="12" y2="-2" stroke-opacity="0.5"/>
    <line x1="-12" y1="2" x2="0" y2="0" stroke-opacity="0.5"/>
  </g>
</svg>
